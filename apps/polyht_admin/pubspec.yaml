name: polyht_admin
description: PolyH.T Admin app for test paper management.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  excel: ^4.0.6
  file_picker: ^8.0.0
  flutter_pdfview: ^1.3.2
  flutter_secure_storage: ^9.0.0
  http: ^1.2.1
  intl: ^0.19.0
  open_filex: ^4.7.0
  package_info_plus: ^8.1.4
  path_provider: ^2.1.2
  provider: ^6.1.2
  qr_flutter: ^4.1.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

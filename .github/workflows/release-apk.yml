name: Release Apps

on:
  workflow_dispatch:
    inputs:
      versionName:
        description: "Release version name, for example 1.0.1"
        required: true
        default: "1.0.1"
      buildNumber:
        description: "Android build number, must increase every release"
        required: true
        default: "2"
      mandatory:
        description: "Force users to update before continuing"
        required: true
        default: "false"
      releaseNotes:
        description: "Short release notes shown in the apps"
        required: true
        default: "Stability and security improvements."
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    name: Build and Publish
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.vars.outputs.version_name }}
      build_number: ${{ steps.vars.outputs.build_number }}
      api_base_url: ${{ steps.vars.outputs.api_base_url }}
      latest_release_base_url: ${{ steps.vars.outputs.latest_release_base_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          channel: stable
          cache: true

      - name: Resolve release values
        id: vars
        shell: bash
        run: |
          VERSION_NAME="${{ github.event.inputs.versionName }}"
          BUILD_NUMBER="${{ github.event.inputs.buildNumber }}"
          MANDATORY="${{ github.event.inputs.mandatory }}"
          RELEASE_NOTES="${{ github.event.inputs.releaseNotes }}"
          if [ -z "$VERSION_NAME" ]; then VERSION_NAME="${GITHUB_REF_NAME#v}"; fi
          if [ -z "$BUILD_NUMBER" ]; then
            PREVIOUS_BUILD="$(jq -r '.latestBuild // empty' website/releases/polyht_latest.json 2>/dev/null || true)"
            if [ -n "$PREVIOUS_BUILD" ] && [ "$PREVIOUS_BUILD" != "null" ]; then
              BUILD_NUMBER=$((PREVIOUS_BUILD + 1))
            fi
          fi
          if [[ "$GITHUB_REF_TYPE" == "tag" && "$VERSION_NAME" =~ ^[0-9]+\.[0-9]+\.([0-9]+)$ ]]; then
            TAG_BUILD="${BASH_REMATCH[1]}"
            if [ -z "$BUILD_NUMBER" ] || [ "$BUILD_NUMBER" -lt "$TAG_BUILD" ]; then
              BUILD_NUMBER="$TAG_BUILD"
            fi
          fi
          if [ -z "$BUILD_NUMBER" ]; then BUILD_NUMBER="${GITHUB_RUN_NUMBER}"; fi
          if [ -z "$MANDATORY" ]; then MANDATORY="true"; fi
          if [ -z "$RELEASE_NOTES" ]; then RELEASE_NOTES="$(jq -r '.releaseNotes // empty' website/releases/polyht_latest.json 2>/dev/null || true)"; fi
          if [ -z "$RELEASE_NOTES" ] || [ "$RELEASE_NOTES" = "null" ]; then RELEASE_NOTES="Poly H.T combined APK release."; fi
          WEBSITE_BASE_URL="${{ vars.WEBSITE_BASE_URL }}"
          if [ -z "$WEBSITE_BASE_URL" ]; then WEBSITE_BASE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"; fi
          API_BASE_URL="${{ vars.API_BASE_URL }}"
          if [ -z "$API_BASE_URL" ]; then API_BASE_URL="https://backend-two-mauve-83.vercel.app/api"; fi
          RELEASE_BASE_URL="https://github.com/${{ github.repository }}/releases/download/v$VERSION_NAME"
          LATEST_RELEASE_BASE_URL="https://github.com/${{ github.repository }}/releases/latest/download"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "mandatory=$MANDATORY" >> "$GITHUB_OUTPUT"
          echo "release_notes=$RELEASE_NOTES" >> "$GITHUB_OUTPUT"
          echo "website_base_url=$WEBSITE_BASE_URL" >> "$GITHUB_OUTPUT"
          echo "api_base_url=$API_BASE_URL" >> "$GITHUB_OUTPUT"
          echo "release_base_url=$RELEASE_BASE_URL" >> "$GITHUB_OUTPUT"
          echo "latest_release_base_url=$LATEST_RELEASE_BASE_URL" >> "$GITHUB_OUTPUT"

      - name: Configure Android signing when secrets exist
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        shell: bash
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "No Android signing secret configured; building unsigned release APKs."
            exit 0
          fi
          for app in apps/polyht_admin; do
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$app/android/release.jks"
            printf '%s\n' \
              "storePassword=$ANDROID_KEYSTORE_PASSWORD" \
              "keyPassword=$ANDROID_KEY_PASSWORD" \
              "keyAlias=$ANDROID_KEY_ALIAS" \
              "storeFile=release.jks" > "$app/android/key.properties"
          done

      - name: Build Poly H.T APK
        working-directory: apps/polyht_admin
        run: |
          flutter pub get
          flutter build apk --release \
            --build-name "${{ steps.vars.outputs.version_name }}" \
            --build-number "${{ steps.vars.outputs.build_number }}" \
            --dart-define=API_BASE_URL="${{ steps.vars.outputs.api_base_url }}" \
            --dart-define=UPDATE_MANIFEST_URL="${{ steps.vars.outputs.latest_release_base_url }}/polyht_latest.json"

      - name: Prepare website release files
        shell: bash
        run: |
          mkdir -p public/releases
          APP_APK="polyht-v${{ steps.vars.outputs.version_name }}+${{ steps.vars.outputs.build_number }}.apk"
          cp apps/polyht_admin/build/app/outputs/flutter-apk/app-release.apk "public/releases/$APP_APK"
          jq -n \
            --arg appId "polyht" \
            --arg version "${{ steps.vars.outputs.version_name }}" \
            --argjson build "${{ steps.vars.outputs.build_number }}" \
            --argjson mandatory "${{ steps.vars.outputs.mandatory }}" \
            --arg notes "${{ steps.vars.outputs.release_notes }}" \
            --arg download "${{ steps.vars.outputs.release_base_url }}/$APP_APK" \
            --arg packageName "in.polyht.polyht_admin" \
            --arg playStoreUrl "https://play.google.com/store/apps/details?id=in.polyht.polyht_admin" \
            '{appId: $appId, latestVersion: $version, latestBuild: $build, mandatory: $mandatory, releaseNotes: $notes, downloadUrl: $download, packageName: $packageName, playStoreUrl: $playStoreUrl}' \
            > public/releases/polyht_latest.json
          printf '%s\n' \
            '<!doctype html>' \
            '<html>' \
            '<head><meta charset="utf-8"><title>Poly H.T Downloads</title></head>' \
            '<body>' \
            '<h1>Poly H.T Downloads</h1>' \
            "<p><a href=\"releases/$APP_APK\">Download Poly H.T</a></p>" \
            '</body>' \
            '</html>' > public/index.html

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.vars.outputs.version_name }}
          name: Poly H.T v${{ steps.vars.outputs.version_name }}
          body: ${{ steps.vars.outputs.release_notes }}
          files: |
            public/releases/*.apk
            public/releases/*.json

      - uses: actions/configure-pages@v5
        if: ${{ vars.PUBLISH_GITHUB_PAGES == 'true' }}
      - uses: actions/upload-pages-artifact@v3
        if: ${{ vars.PUBLISH_GITHUB_PAGES == 'true' }}
        with:
          path: public
      - uses: actions/deploy-pages@v4
        if: ${{ vars.PUBLISH_GITHUB_PAGES == 'true' }}

  ios:
    name: Build iOS App Artifacts
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          channel: stable
          cache: true

      - name: Build unsigned Poly H.T iOS app
        working-directory: apps/polyht_admin
        run: |
          flutter pub get
          flutter build ios --release --no-codesign \
            --build-name "${{ needs.build.outputs.version_name }}" \
            --build-number "${{ needs.build.outputs.build_number }}" \
            --dart-define=API_BASE_URL="${{ needs.build.outputs.api_base_url }}" \
            --dart-define=UPDATE_MANIFEST_URL="${{ needs.build.outputs.latest_release_base_url }}/polyht_latest.json"

      - name: Package unsigned iOS apps
        shell: bash
        run: |
          mkdir -p public/releases
          rm -rf Payload
          mkdir Payload
          cp -R "apps/polyht_admin/build/ios/iphoneos/Runner.app" Payload/
          zip -qry "public/releases/polyht-v${{ needs.build.outputs.version_name }}+${{ needs.build.outputs.build_number }}-unsigned.ipa" Payload

      - name: Attach iOS artifacts to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version_name }}
          files: public/releases/*.ipa
